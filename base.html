<!DOCTYPE html>
<html>
<head>
    <title>PrivyChat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="site-header">
    <div class="navbar">

        <a href="/" class="nav-logo">🔒 Privy<span>Chat</span></a>


        <nav class="nav-links">
            {% if session.user %}
                <a href="/">Home</a>
                <span>{{ session.user }} ({{ session.company }})</span>
                <a href="/chat">Workspace</a>
                <a href="/logout">Logout</a>
            {% else %}
                <a href="/">Home</a>
                <a href="/login">Login</a>
                <a href="/register">Register</a>
            {% endif %}
        </nav>
    </div>
</header>

{% block content %}{% endblock %}

</body>
</html>
