{% extends "base.html" %}

{% block content %}

<div class="container home-container">

    <h1>Create Company Space</h1>

    {% if error %}
        <div class="status-message status-error">{{ error }}</div>
    {% endif %}

    <form method="POST" class="login-form">

        <label>Company Name:</label>
        <select name="company" required>
            <option value="">Select company</option>
            {% for company_name in companies %}
                <option value="{{ company_name }}">{{ company_name }}</option>
            {% endfor %}
        </select>

        <label>Username:</label>
        <input type="text" name="username" placeholder="Enter username" required>

        <label>Password:</label>
        <input type="password" name="password" placeholder="Enter password" required>

    <label class="checkbox">
        <input type="checkbox" name="privacy" required>
        <span>I agree to the <a href="/privacy" target="_blank">Privacy Policy</a></span>
    </label>

        <button type="submit" class="btn-primary">Register</button>

    </form>

    <div style="margin-top:20px;">  
        <a href="/login">Already have an account?</a><br><br>
        <a href="/create_company">Register a New Company Space</a><br><br>
        <a href="/">Back to Home</a>
    </div>

</div>

{% endblock %}
